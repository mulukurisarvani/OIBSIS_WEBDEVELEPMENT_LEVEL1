<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 3 - Temperature Converter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h2 class="title">Temperature Converter</h2>

        <div class="form-group">
            <label>Degrees</label>
            <input type="number" id="degrees" placeholder="Enter value">
        </div>

        <div class="form-group">
            <label>Type</label>
            <select id="type">
                <option value="C">Celsius</option>
                <option value="F">Fahrenheit</option>
                <option value="K">Kelvin</option>
            </select>
        </div>

        <div class="form-group">
            <label>Result</label>
            <input type="text" id="result" placeholder="Result will appear here" readonly>
        </div>

        <button onclick="convertTemperature()" class="convert-btn">
            Convert
        </button>

    </div>

<script src="script.js"></script>
</body>
</html>
